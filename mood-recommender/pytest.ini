[pytest]
# ── Test discovery ─────────────────────────────────────────────────────────────
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ─────────────────────────────────────────────────────────────────────
addopts =
    --tb=short
    --strict-markers
    -q

# ── Markers ────────────────────────────────────────────────────────────────────
markers =
    unit: Fast unit tests (no external I/O)
    integration: Tests that call real APIs (require .env)
    slow: Tests that may take >10s

# ── Asyncio mode (for FastAPI async route tests) ───────────────────────────────
asyncio_mode = auto
