version: "3.9"

# ─────────────────────────────────────────────────────────
#  Mood-Adaptive Recommender — Docker Compose
#  Runs FastAPI backend + Streamlit frontend together.
#
#  Usage:
#    docker-compose up --build
# ─────────────────────────────────────────────────────────

services:

  # ── FastAPI backend ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mood_recommender_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount embeddings so the index persists across rebuilds
      - ./backend/data:/app/backend/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Streamlit frontend ───────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mood_recommender_frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
